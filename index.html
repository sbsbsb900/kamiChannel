<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // ==========================================
  // 【超重要】ここにあなたのSupabaseの情報を貼り付けます
  // ==========================================
  const SUPABASE_URL = "https://dywufupdhisjuneuvzwn.supabase.co";
  const SUPABASE_ANON_KEY = "あなたのanonキー";
  
  // Supabaseの初期化
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const MAIN_PAGE_PASSWORD = "9441";  
  const ADMIN_MASTER_KEY = "0917";      

  let isMuted = true;
  let audioCtx = null;

  // ※初期データはデータベースが空の時に使用します
  const defaultAnswers = [
    { id: "default-1", nickname: "かなパイセン", emoji: "🦊", category: "機種変更", userType: "シニア層", status: "ガラケー利用（他社）", purpose: "操作の相談", talkExample: "「今のスマホ、毎月の料金どれくらいかご存知ですか？実は今のプランのまま安くできるチャンスがあるんですよ😊」", color: "blue", deleteKey: "1111", likes: 12, x: 10, y: 20, animType: 1 },
    { id: "default-2", nickname: "エース岡田", emoji: "🐻", category: "新規契約", userType: "20代単身", status: "アパート一人暮らし", purpose: "ネットの速度相談", talkExample: "「工事不要でコンセントに挿すだけのWi-Fiなら、今日からすぐYouTubeもゲームもサクサク使い放題になりますよ！🚀」", color: "pink", deleteKey: "2222", likes: 24, x: 45, y: 35, animType: 2 },
    { id: "default-3", nickname: "マネージャー", emoji: "🐰", category: "料金見直し", userType: "ファミリー層", status: "家族4人（他社回線）", purpose: "固定費を下げたい", talkExample: "「ご家族全員のスマホと、お家のネットをセットにまとめるだけで、毎月映画1本分以上の節約になります！🎬」", color: "green", deleteKey: "3333", likes: 18, x: 25, y: 60, animType: 3 }
  ];

  function checkGatePassword() {
    const input = document.getElementById('gatePassInput').value;
    const errorMsg = document.getElementById('gateErrorMsg');
    const overlay = document.getElementById('gatekeeperOverlay');
    const mainContent = document.getElementById('mainContent');
    if (input === MAIN_PAGE_PASSWORD) {
      errorMsg.classList.add('hidden');
      overlay.classList.add('hidden');
      mainContent.classList.remove('opacity-0', 'pointer-events-none');
      try { sessionStorage.setItem('gate_authenticated', 'true'); } catch(e){}
      initAudio();
      playPopSound();
    } else {
      errorMsg.classList.remove('hidden');
      document.getElementById('gatePassInput').value = '';
    }
  }

  function initAudio() {
    if (isMuted) return;
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
    } catch (e) {}
  }

  function playPopSound() {
    if (isMuted || !audioCtx) return;
    try {
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    } catch(e){}
  }

  function toggleMute() {
    isMuted = !isMuted;
    const syncMuteBtns = () => {
      [document.getElementById('muteBtn'), document.getElementById('muteBtnMob')].forEach(btn => {
        if(!btn) return;
        if (isMuted) {
          btn.innerHTML = '<i class="fas fa-volume-mute"></i>';
          btn.className = "w-7 h-7 rounded-lg bg-white text-rose-500 border border-sky-100 shadow-sm flex items-center justify-center active:scale-90";
        } else {
          btn.innerHTML = '<i class="fas fa-volume-up"></i>';
          btn.className = "w-7 h-7 rounded-lg bg-white text-sky-600 border border-sky-100 shadow-sm flex items-center justify-center active:scale-90";
        }
      });
    };
    syncMuteBtns();
    if (!isMuted) initAudio();
  }

  let answerDatabase = [];
  const colorPalettes = {
    pink: { bg: "bg-pink-50/95", border: "border-pink-200", text: "text-pink-700", shadow: "shadow-pink-100" },
    blue: { bg: "bg-sky-50/95", border: "border-sky-200", text: "text-sky-700", shadow: "shadow-sky-100" },
    yellow: { bg: "bg-amber-50/95", border: "border-amber-200", text: "text-amber-700", shadow: "shadow-amber-100" },
    purple: { bg: "bg-purple-50/95", border: "border-purple-200", text: "text-purple-700", shadow: "shadow-purple-100" },
    green: { bg: "bg-emerald-50/95", border: "border-emerald-200", text: "text-emerald-700", shadow: "shadow-emerald-100" }
  };
  const emojis = ["🐱", "🐶", "🐰", "🦊", "🐻", "🐼", "🐨", "🦁", "🐯", "🐹", "🐸", "🐵", "🐧", "🐦", "🐥"];
  let currentDetailId = null;
  let keypadInputValue = "";

  // 📥 データベースから最新の投稿を取得する関数
  async function loadFromDatabase() {
    const { data, error } = await supabase.from('posts').select('*');
    if (error) {
      console.error("データ取得エラー:", error);
      answerDatabase = [...defaultAnswers];
    } else if (data && data.length > 0) {
      answerDatabase = data;
    } else {
      answerDatabase = [...defaultAnswers];
    }
    renderBoard();
  }

  // 🔔 リアルタイムで他の端末の投稿を検知して画面を更新する設定
  function setupRealtimeListener() {
    supabase
      .channel('schema-db-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => {
        loadFromDatabase(); // 何か変更（追加・削除・ドラッグ）があれば再読み込み
      })
      .subscribe();
  }

  window.addEventListener('DOMContentLoaded', () => {
    try {
      if (sessionStorage.getItem('gate_authenticated') === 'true') {
        document.getElementById('gatekeeperOverlay').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('opacity-0', 'pointer-events-none');
      }
    } catch(e){}

    document.getElementById('gateSubmitBtn').addEventListener('click', checkGatePassword);
    document.getElementById('gatePassInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') checkGatePassword();
    });

    // 起動時にデータベースから読み込み、リアルタイム監視を開始
    loadFromDatabase();
    setupRealtimeListener();
    
    setupFormOptions();

    document.getElementById('muteBtn').addEventListener('click', toggleMute);
    document.getElementById('muteBtnMob').addEventListener('click', toggleMute);
    
    const openHelp = () => { initAudio(); document.getElementById('helpModal').classList.remove('hidden'); };
    document.getElementById('helpOpenBtn').addEventListener('click', openHelp);
    document.getElementById('helpOpenBtnMob').addEventListener('click', openHelp);

    document.getElementById('helpCloseBtn').addEventListener('click', () => document.getElementById('helpModal').classList.add('hidden'));
    document.getElementById('postOpenBtn').addEventListener('click', openPostModal);
    document.getElementById('postCloseBtn').addEventListener('click', () => document.getElementById('postModal').classList.add('hidden'));
    document.getElementById('detailCloseBtn').addEventListener('click', () => document.getElementById('detailModal').classList.add('hidden'));
    document.getElementById('deleteBtn').addEventListener('click', clickDeleteBtn);
    document.getElementById('keypadCloseBtn').addEventListener('click', () => document.getElementById('keypadModal').classList.add('hidden'));
    
    document.getElementById('postSubmitBtn').addEventListener('click', executeSubmitAnswer);
    document.getElementById('detailLikeBtn').addEventListener('click', executeLike);

    document.querySelectorAll('#keypadGrid button').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.getAttribute('data-key');
        pressKey(key);
      });
    });
  });

  function generateRandom4DigitKey() {
    return Math.floor(1000 + Math.random() * 9000).toString();
  }

  function setupFormOptions() {
    const emojiSelector = document.getElementById('emojiSelector');
    emojiSelector.innerHTML = '';
    emojis.forEach((emoji, index) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = `w-8 h-8 flex items-center justify-center text-lg rounded-lg border ${index === 0 ? 'border-pink-400 bg-pink-50' : 'border-gray-200 bg-white'}`;
      btn.textContent = emoji;
      btn.addEventListener('click', () => {
        document.querySelectorAll('#emojiSelector button').forEach(b => b.className = 'w-8 h-8 flex items-center justify-center text-lg rounded-lg border border-gray-200 bg-white');
        btn.className = 'w-8 h-8 flex items-center justify-center text-lg rounded-lg border border-pink-400 bg-pink-50';
        document.getElementById('selectedEmoji').value = emoji;
      });
      emojiSelector.appendChild(btn);
    });

    const colorSelector = document.getElementById('colorSelector');
    colorSelector.innerHTML = '';
    Object.keys(colorPalettes).forEach((color, index) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      let bgClass = 'bg-pink-300';
      if(color === 'blue') bgClass = 'bg-sky-300';
      if(color === 'yellow') bgClass = 'bg-amber-300';
      if(color === 'purple') bgClass = 'bg-purple-300';
      if(color === 'green') bgClass = 'bg-emerald-300';

      btn.className = `w-6 h-6 rounded-full ${bgClass} border-2 ${index === 0 ? 'border-gray-700 scale-110' : 'border-transparent'}`;
      btn.classList.add('cursor-pointer');
      btn.addEventListener('click', () => {
        document.querySelectorAll('#colorSelector button').forEach(b => b.classList.remove('border-gray-700', 'scale-110'));
        btn.classList.add('border-gray-700', 'scale-110');
        document.getElementById('selectedColor').value = color;
      });
      colorSelector.appendChild(btn);
    });

    document.getElementById('deleteKeyInput').value = generateRandom4DigitKey();
  }

  function openPostModal() {
    initAudio();
    document.getElementById('nicknameInput').value = '';
    document.getElementById('categoryInput').value = '';
    document.getElementById('userTypeInput').value = '';
    document.getElementById('statusInput').value = '';
    document.getElementById('purposeInput').value = '';
    document.getElementById('talkExampleInput').value = '';
    document.getElementById('deleteKeyInput').value = generateRandom4DigitKey();
    document.getElementById('postModal').classList.remove('hidden');
  }

  // 📤 新しい投稿をデータベースに保存する
  async function executeSubmitAnswer() {
    const nickname = document.getElementById('nicknameInput').value.trim() || "ななし";
    const emoji = document.getElementById('selectedEmoji').value;
    const category = document.getElementById('categoryInput').value.trim();
    const userType = document.getElementById('userTypeInput').value.trim();
    const status = document.getElementById('statusInput').value.trim();
    const purpose = document.getElementById('purposeInput').value.trim();
    const talkExample = document.getElementById('talkExampleInput').value.trim();
    const color = document.getElementById('selectedColor').value;
    const deleteKey = document.getElementById('deleteKeyInput').value.trim();

    if (!talkExample) {
      alert("トーク例を入力してください！☁️");
      return;
    }
    if (!/^\d{4}$/.test(deleteKey)) {
      alert("ひみつのカギは4桁の数字で入力してください🔑");
      return;
    }

    const newPost = {
      id: Date.now().toString(),
      nickname,
      emoji,
      category,
      userType,
      status,
      purpose,
      talkExample,
      color,
      deleteKey,
      likes: 0,
      x: Math.random() * 60 + 5,
      y: Math.random() * 55 + 15,
      animType: Math.floor(Math.random() * 3) + 1
    };

    // Supabaseへデータを挿入
    const { error } = await supabase.from('posts').insert([newPost]);
    if (error) {
      alert("データの保存に失敗しました…");
      console.error(error);
      return;
    }
    
    playPopSound();
    document.getElementById('postModal').classList.add('hidden');
  }

  function renderBoard() {
    const board = document.getElementById('skyBoard');
    const countSpan = document.getElementById('answerCount');
    const welcome = document.getElementById('welcomeMessage');

    document.querySelectorAll('.answer-cloud-card').forEach(el => el.remove());
    countSpan.textContent = answerDatabase.length;

    if (answerDatabase.length === 0) {
      welcome.classList.remove('hidden');
      return;
    } else {
      welcome.classList.add('hidden');
    }

    answerDatabase.forEach(post => {
      const palette = colorPalettes[post.color] || colorPalettes.pink;
      const card = document.createElement('div');
      card.className = `answer-cloud-card gpu-accelerated absolute px-3 py-2 rounded-2xl border-2 ${palette.bg} ${palette.border} ${palette.shadow} shadow-md flex items-center gap-1.5 cursor-pointer max-w-[150px] md:max-w-[190px] animate-float-${post.animType}`;
      card.style.left = `${post.x}%`;
      card.style.top = `${post.y}%`;
      
      card.innerHTML = `
        <span class="text-base flex-shrink-0 select-none pointer-events-none">${post.emoji}</span>
        <div class="overflow-hidden select-none pointer-events-none">
          <p class="text-[9px] font-bold ${palette.text} truncate">${post.nickname}</p>
          <p class="text-[10px] font-medium text-gray-700 truncate">${post.talkExample}</p>
        </div>
      `;

      setupDragElement(card, post);
      board.appendChild(card);
    });
  }

  function setupDragElement(card, postData) {
    let active = false;
    let currentX; let currentY; let initialX; let initialY;
    let xOffset = 0; let yOffset = 0; let hasDragged = false;
    const board = document.getElementById('skyBoard');

    card.addEventListener('touchstart', dragStart, { passive: false });
    card.addEventListener('touchend', dragEnd, { passive: true });
    card.addEventListener('touchmove', drag, { passive: false });
    card.addEventListener('mousedown', dragStart, { passive: false });
    window.addEventListener('mouseup', dragEnd, { passive: true });
    window.addEventListener('mousemove', drag, { passive: false });

    function dragStart(e) {
      initAudio();
      hasDragged = false;
      card.classList.remove(`animate-float-${postData.animType}`);
      card.style.zIndex = "40";
      const boardRect = board.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();
      xOffset = cardRect.left - boardRect.left;
      yOffset = cardRect.top - boardRect.top;

      if (e.type === "touchstart") {
        initialX = e.touches[0].clientX - xOffset;
        initialY = e.touches[0].clientY - yOffset;
      } else {
        initialX = e.clientX - xOffset;
        initialY = e.clientY - yOffset;
      }
      if (e.target === card || card.contains(e.target)) active = true;
    }

    function drag(e) {
      if (!active) return;
      e.preventDefault();
      if (e.type === "touchmove") {
        currentX = e.touches[0].clientX - initialX;
        currentY = e.touches[0].clientY - initialY;
      } else {
        currentX = e.clientX - initialX;
        currentY = e.clientY - initialY;
      }
      if (Math.abs(currentX - xOffset) > 3 || Math.abs(currentY - yOffset) > 3) hasDragged = true;

      const boardRect = board.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();
      if (currentX < 0) currentX = 0;
      if (currentX > boardRect.width - cardRect.width) currentX = boardRect.width - cardRect.width;
      if (currentY < 0) currentY = 0;
      if (currentY > boardRect.height - cardRect.height) currentY = boardRect.height - cardRect.height;

      xOffset = currentX; yOffset = currentY;
      card.style.left = `${currentX}px`;
      card.style.top = `${currentY}px`;
    }

    // 📍 ドラッグを離した位置をデータベースに上書き保存する
    async function dragEnd() {
      if (!active) return;
      active = false;
      card.style.zIndex = "auto";
      const boardRect = board.getBoundingClientRect();
      const finalXPct = (xOffset / boardRect.width) * 100;
      const finalYPct = (yOffset / boardRect.height) * 100;

      if (hasDragged) {
        // 位置をSupabaseへ更新保存
        await supabase.from('posts').update({ x: finalXPct, y: finalYPct }).eq('id', postData.id);
      } else {
        openDetailModal(postData.id);
      }
      card.classList.add(`animate-float-${postData.animType}`);
    }
  }

  function openDetailModal(id) {
    initAudio();
    const post = answerDatabase.find(p => p.id === id);
    if (!post) return;

    currentDetailId = id;
    document.getElementById('detailEmoji').textContent = post.emoji;
    document.getElementById('detailAuthor').textContent = post.nickname;
    document.getElementById('detailLikeCount').textContent = post.likes;

    const contentArea = document.getElementById('detailContentArea');
    contentArea.innerHTML = '';

    const items = [
      { label: "獲得種別", val: post.category },
      { label: "お客様種別", val: post.userType },
      { label: "固定状況", val: post.status },
      { label: "来店目的", val: post.purpose },
      { label: "トーク例", val: post.talkExample, fullWidth: true }
    ];

    items.forEach(item => {
      if (!item.val) return;
      const div = document.createElement('div');
      if (item.fullWidth) {
        div.className = "bg-sky-50/60 p-2 rounded-xl border border-sky-100 mt-1";
        div.innerHTML = `<span class="block text-[9px] font-bold text-sky-700 mb-0.5">${item.label}</span><p class="text-gray-800 whitespace-pre-wrap font-medium leading-relaxed">${item.val}</p>`;
      } else {
        div.className = "bg-sky-50/40 p-1.5 rounded-lg border border-sky-100/70";
        div.innerHTML = `<span class="block text-[8px] font-bold text-sky-600">${item.label}</span><p class="text-gray-800 font-semibold">${item.val}</p>`;
      }
      contentArea.appendChild(div);
    });

    document.getElementById('detailModal').classList.remove('hidden');
  }

  // ❤️ いいね数をデータベースにプラスして保存する
  async function executeLike() {
    const post = answerDatabase.find(p => p.id === currentDetailId);
    if (!post) return;

    const newLikes = post.likes + 1;
    const { error } = await supabase.from('posts').update({ likes: newLikes }).eq('id', currentDetailId);
    
    if(!error) {
      post.likes = newLikes;
      document.getElementById('detailLikeCount').textContent = newLikes;
      playPopSound();
    }
  }

  function clickDeleteBtn() {
    document.getElementById('keypadDisplay').textContent = "____";
    keypadInputValue = "";
    document.getElementById('keypadError').classList.add('hidden');
    document.getElementById('keypadModal').classList.remove('hidden');
  }

  // 🗑 指定された投稿をデータベースから完全に削除する
  async function pressKey(key) {
    const display = document.getElementById('keypadDisplay');
    const errorDiv = document.getElementById('keypadError');
    errorDiv.classList.add('hidden');

    if (key === 'C') {
      keypadInputValue = "";
    } else if (key === 'OK') {
      const post = answerDatabase.find(p => p.id === currentDetailId);
      if (!post) return;

      if (keypadInputValue === post.deleteKey || keypadInputValue === ADMIN_MASTER_KEY) {
        // Supabaseから該当のデータを削除
        const { error } = await supabase.from('posts').delete().eq('id', currentDetailId);
        
        if (!error) {
          answerDatabase = answerDatabase.filter(p => p.id !== currentDetailId);
          renderBoard();
          document.getElementById('keypadModal').classList.add('hidden');
          document.getElementById('detailModal').classList.add('hidden');
        }
      } else {
        errorDiv.classList.remove('hidden');
        keypadInputValue = "";
      }
    } else {
      if (keypadInputValue.length < 4) keypadInputValue += key;
    }

    let dots = keypadInputValue;
    while (dots.length < 4) dots += "_";
    display.textContent = dots;
  }
</script>
